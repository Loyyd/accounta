version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: flask run --host 0.0.0.0
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - ./server:/app
      - /app/__pycache__
    ports:
      - "5001:5000"

  redis:
    ports:
      - "6379:6379"
