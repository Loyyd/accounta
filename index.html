<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <h1>Expense Tracker</h1>
            <p class="lead">Manage your finances with ease.</p>
          </div>
          <div id="authArea" style="text-align:right">
            <a href="login.html" id="loginLink" class="btn-ghost" style="margin-right:8px">Login / Register</a>
            <button id="signOutBtn" class="btn-ghost" style="display:none">Sign out</button>
            <div id="userHint" class="muted" style="font-size:12px"></div>
          </div>
        </div>
      </header>

      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="add-transaction">Add Transaction</button>
        <button class="tab-btn" data-tab="categories">Categories</button>
      </nav>

      <div id="overview-view" class="tab-view active">
        <section class="card stats-card">
          <div class="stats">
            <div class="stat">
              <h3 id="totalIncome">$0.00</h3>
              <p>Income</p>
            </div>
            <div class="stat">
              <h3 id="totalExpense">$0.00</h3>
              <p>Expense</p>
            </div>
            <div class="stat">
              <h3 id="netTotal">$0.00</h3>
              <p>Net</p>
            </div>
          </div>
          <div class="categories">
            <h4>Category breakdown (Expenses)</h4>
            <ul id="categoryList" class="category-list"></ul>
          </div>
        </section>

        <section class="card ledger-card">
          <h3>Entries</h3>
          <div id="entries" class="entries"></div>
        </section>
      </div>

      <div id="add-transaction-view" class="tab-view">
        <section class="card input-card">
        <form id="entryForm">
          <div class="row">
            <label>Type</label>
            <select id="type" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>

          <div class="row two-up">
            <div>
              <label>Amount</label>
              <input id="amount" type="number" step="0.01" placeholder="0.00" required />
            </div>
            <div>
              <label>Category</label>
              <select id="category" required>
                <option value="">Select a category</option>
              </select>
            </div>
          </div>

          <div class="row">
            <label>Date</label>
            <input id="date" type="date" required />
          </div>

          <div class="row">
            <label>Description (optional)</label>
            <input id="description" type="text" placeholder="e.g., Groceries, Monthly salary" />
          </div>

          <div class="row actions">
            <button type="submit" class="btn-primary">Add</button>
            <button id="clearAll" type="button" class="btn-ghost">Clear All</button>
          </div>
        </form>
      </section>
      </div>

      <div id="categories-view" class="tab-view">
        <section class="card">
          <h3>Manage Categories</h3>
          <form id="categoryForm" style="margin-bottom: 20px;">
            <div class="row">
              <label>Category Name</label>
              <input id="newCategoryName" type="text" placeholder="e.g., Entertainment, Transport" required />
            </div>
            <div class="row">
              <label>Type</label>
              <select id="categoryType" required>
                <option value="expense">Expense</option>
                <option value="income">Income</option>
              </select>
            </div>
            <div class="row">
              <label>Color</label>
              <div class="color-palette">
                <div class="color-option" data-color="#6ee7b7" style="background: #6ee7b7;" title="Green"></div>
                <div class="color-option" data-color="#60a5fa" style="background: #60a5fa;" title="Blue"></div>
                <div class="color-option" data-color="#fbbf24" style="background: #fbbf24;" title="Yellow"></div>
                <div class="color-option" data-color="#f472b6" style="background: #f472b6;" title="Pink"></div>
                <div class="color-option" data-color="#a78bfa" style="background: #a78bfa;" title="Purple"></div>
                <div class="color-option" data-color="#fb923c" style="background: #fb923c;" title="Orange"></div>
                <div class="color-option" data-color="#ef4444" style="background: #ef4444;" title="Red"></div>
              </div>
              <input id="categoryColor" type="hidden" value="#6ee7b7" required />
            </div>
            <div class="row actions">
              <button type="submit" class="btn-primary">Add Category</button>
            </div>
          </form>

          <div>
            <h4>Expense Categories</h4>
            <ul id="expenseCategoriesList" class="category-list"></ul>
          </div>

          <div style="margin-top: 20px;">
            <h4>Income Categories</h4>
            <ul id="incomeCategoriesList" class="category-list"></ul>
          </div>
        </section>
      </div>
      </div>

      <footer class="footer">Your data is saved securely to your account.</footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
