<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - accounta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app login-container">
      <header class="header">
        <div>
          <img src="accounta.png" alt="accounta" style="height:80px;width:80px;object-fit:contain" />
          <h1>accounta</h1>
        </div>
        <p class="lead">Sign in to access your financial dashboard.</p>
      </header>

      <section class="card input-card login-card">
        <div id="messages"></div>
        <form id="authForm">
          <div class="row">
            <label>Username</label>
            <input id="username" type="text" placeholder="Enter your username" required />
          </div>
          <div class="row">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter your password" required />
          </div>
          <div class="row actions">
            <button id="loginBtn" type="button" class="btn-primary">Login</button>
            <button id="regBtn" type="button" class="btn-ghost">Register</button>
          </div>
        </form>
      </section>

    </main>

    <script>
      const API_BASE = 'http://127.0.0.1:5001/api'
      const TOKEN_KEY = 'finance-tracker.token'

      const $ = s => document.querySelector(s)
      const messages = $('#messages')

      function showMsg(m, isError=false){
        messages.textContent = m
        messages.style.color = isError ? '#ff6b6b' : 'var(--muted)'
      }

      async function post(endpoint, body){
        const res = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        })
        return res
      }

      document.getElementById('loginBtn').addEventListener('click', async ()=>{
        const username = $('#username').value.trim()
        const password = $('#password').value
        if(!username || !password) return showMsg('username and password required', true)
        const res = await post('/login', {username, password})
        const j = await res.json()
        if(!res.ok) return showMsg(j.error || 'Login failed', true)
        localStorage.setItem(TOKEN_KEY, j.token)
        showMsg('Login successful — redirecting...')
        setTimeout(()=>location.href='index.html', 700)
      })

      document.getElementById('regBtn').addEventListener('click', async ()=>{
        const username = $('#username').value.trim()
        const password = $('#password').value
        if(!username || !password) return showMsg('username and password required', true)
        const res = await post('/register', {username, password})
        const j = await res.json()
        if(!res.ok) return showMsg(j.error || 'Register failed', true)
        localStorage.setItem(TOKEN_KEY, j.token)
        showMsg('Account created — signing in...')
        setTimeout(()=>location.href='index.html', 700)
      })

      // Handle Enter key to submit login
      $('#authForm').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault()
          document.getElementById('loginBtn').click()
        }
      })
    </script>

  </body>
</html>
