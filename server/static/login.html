<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - accounta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app login-container">
      <header class="header" style="margin-bottom:48px">
        <h1 style="font-size:3.5em;margin-bottom:12px">💰 accounta</h1>
        <p class="lead" style="font-size:1.1em">Sign in to access your financial dashboard.</p>
      </header>

      <section class="card input-card login-card">
        <div id="messages" class="muted" style="margin-bottom:20px;min-height:20px;text-align:center"></div>
        <form id="authForm">
          <div class="row" style="margin-bottom:24px">
            <label style="font-size:14px;margin-bottom:10px">Username</label>
            <input id="username" type="text" placeholder="Enter your username" required style="padding:14px;font-size:15px" />
          </div>
          <div class="row" style="margin-bottom:32px">
            <label style="font-size:14px;margin-bottom:10px">Password</label>
            <input id="password" type="password" placeholder="Enter your password" required style="padding:14px;font-size:15px" />
          </div>
          <div class="row actions" style="justify-content:center;gap:16px;margin-bottom:0">
            <button id="loginBtn" type="button" class="btn-primary" style="padding:14px 32px;font-size:15px;min-width:140px">Login</button>
            <button id="regBtn" type="button" class="btn-ghost" style="padding:14px 32px;font-size:15px;min-width:140px">Register</button>
          </div>
        </form>
      </section>

    </main>

    <script>
      const API_BASE = 'http://127.0.0.1:5001/api'
      const TOKEN_KEY = 'finance-tracker.token'

      const $ = s => document.querySelector(s)
      const messages = $('#messages')

      function showMsg(m, isError=false){
        messages.textContent = m
        messages.style.color = isError ? '#ff6b6b' : 'var(--muted)'
      }

      async function post(endpoint, body){
        const res = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        })
        return res
      }

      document.getElementById('loginBtn').addEventListener('click', async ()=>{
        const username = $('#username').value.trim()
        const password = $('#password').value
        if(!username || !password) return showMsg('username and password required', true)
        const res = await post('/login', {username, password})
        const j = await res.json()
        if(!res.ok) return showMsg(j.error || 'Login failed', true)
        localStorage.setItem(TOKEN_KEY, j.token)
        showMsg('Login successful — redirecting...')
        setTimeout(()=>location.href='index.html', 700)
      })

      document.getElementById('regBtn').addEventListener('click', async ()=>{
        const username = $('#username').value.trim()
        const password = $('#password').value
        if(!username || !password) return showMsg('username and password required', true)
        const res = await post('/register', {username, password})
        const j = await res.json()
        if(!res.ok) return showMsg(j.error || 'Register failed', true)
        localStorage.setItem(TOKEN_KEY, j.token)
        showMsg('Account created — signing in...')
        setTimeout(()=>location.href='index.html', 700)
      })

      // Handle Enter key to submit login
      $('#authForm').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault()
          document.getElementById('loginBtn').click()
        }
      })
    </script>

  </body>
</html>
