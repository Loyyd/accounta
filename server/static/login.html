<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - accounta</title>
    <link rel="icon" type="image/png" href="accounta.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app login-container app-narrow">
      <header class="header page-header">
        <div class="brand-block">
          <img src="accounta.png" alt="accounta" class="brand-logo brand-logo-lg" />
          <h1>accounta</h1>
        </div>
        <p class="lead">Sign in to access your financial dashboard.</p>
      </header>

      <section class="card input-card login-card">
        <div id="messages"></div>
        <form id="authForm">
          <div class="row">
            <label>Username</label>
            <input id="username" type="text" placeholder="Enter your username" required />
          </div>
          <div class="row">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter your password" required />
            <p class="helper-text">New passwords must be at least 8 characters and include letters and numbers.</p>
          </div>
          <div class="row actions">
            <button id="loginBtn" type="button" class="btn-primary">Login</button>
            <button id="regBtn" type="button" class="btn-ghost">Register</button>
          </div>
        </form>
      </section>

    </main>

    <script src="shared.js"></script>
    <script src="login.js"></script>
  </body>
</html>
