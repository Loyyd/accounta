<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Dashboard - accounta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header page-header">
        <div class="page-header-top">
          <div class="brand-row">
            <img src="accounta.png" alt="accounta" class="brand-logo" />
            <div class="brand-block">
              <h1 class="page-title">Admin Dashboard</h1>
              <p class="lead">Manage users and account access across accounta.</p>
            </div>
          </div>
          <div id="authArea" class="auth-area">
            <div id="userActions" class="auth-actions" style="display:none;">
              <a href="index.html" class="header-icon-btn" aria-label="Dashboard" title="Dashboard">
                <img src="assets/icons/header/home.png" alt="" class="header-icon-img" />
              </a>
              <button id="settingsLink" type="button" class="header-icon-btn" aria-label="Settings" title="Settings">
                <img src="assets/icons/header/setting-wheel.png" alt="" class="header-icon-img" />
              </button>
              <a href="admin.html" class="header-icon-btn is-active" aria-label="Admin Dashboard" title="Admin Dashboard">
                <img src="assets/icons/header/admin-console.png" alt="" class="header-icon-img header-icon-img-admin" />
              </a>
              <button id="signOutBtn" type="button" class="header-icon-btn" aria-label="Logout" title="Logout">
                <img src="assets/icons/header/logout.png" alt="" class="header-icon-img" />
              </button>
            </div>
          </div>
        </div>
      </header>

      <div class="admin-shell">
        <section class="card">
          <div class="header-title-row section-header-lg">
            <h3 class="section-title">User Accounts</h3>
            <div class="muted-copy">
              Total Users: <span id="totalUsers" class="accent-copy"><strong>0</strong></span>
            </div>
          </div>

          <div id="usersTable">
            <div class="table-header">
              <div>Username</div>
              <div>Role</div>
              <div>Entries</div>
              <div>Actions</div>
            </div>
            <div id="usersList"></div>
          </div>
        </section>
      </div>

      <footer class="footer">Admin Dashboard - Manage users with care</footer>
    </main>
    <script src="shared.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
