<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Dashboard - FinFlow</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <h1>🛡️ Admin Dashboard</h1>
            <p class="lead">Manage all FinFlow users and accounts.</p>
          </div>
          <div id="authArea" style="position:relative;">
            <div id="userDropdown" style="display:none;">
              <button id="userMenuBtn" class="user-menu-btn">
                <span id="userHint"></span>
                <span style="margin-left:4px;">▼</span>
              </button>
              <div id="userDropdownMenu" class="user-dropdown-menu">
                <a href="index.html" class="dropdown-item">📊 User Dashboard</a>
                <a href="#" id="signOutBtn" class="dropdown-item">🚪 Logout</a>
              </div>
            </div>
          </div>
        </div>
      </header>

      <section class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h3 style="margin:0">User Accounts</h3>
          <div style="color:var(--muted);font-size:14px">
            Total Users: <span id="totalUsers" style="color:var(--accent);font-weight:600">0</span>
          </div>
        </div>

        <div id="usersTable">
          <div class="table-header" style="display:grid;grid-template-columns:2fr 1fr 1fr 120px;gap:12px;padding:12px;background:rgba(255,255,255,0.02);border-radius:8px;font-weight:600;margin-bottom:8px">
            <div>Username</div>
            <div>Role</div>
            <div>Entries</div>
            <div>Actions</div>
          </div>
          <div id="usersList"></div>
        </div>
      </section>

      <footer class="footer">Admin Dashboard - Manage users with care</footer>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
