version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: accounta-backend
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=sqlite:////app/instance/dev.db
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXP_SECONDS=${JWT_EXP_SECONDS:-86400}
    volumes:
      - ./instance:/app/instance
    networks:
      - accounta-network
    restart: unless-stopped

  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: accounta-sqlite-web
    ports:
      - "8080:8080"
    volumes:
      - ./instance:/data
    command: sqlite_web -H 0.0.0.0 /data/dev.db
    networks:
      - accounta-network
    restart: unless-stopped

networks:
  accounta-network:
    driver: bridge
