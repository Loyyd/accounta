version: '3.8'

services:
  # Flask API and Frontend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: accounta-backend
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=sqlite:////app/instance/dev.db
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXP_SECONDS=${JWT_EXP_SECONDS:-86400}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FLASK_ENV=production
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./instance/dev.db:/app/instance/dev.db
      - /app/instance
    networks:
      - accounta-network
    restart: unless-stopped

  # SQLite Web Database Management UI
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: accounta-sqlite-web
    ports:
      - "8080:8080"
    volumes:
      - ./instance:/data
    command: sqlite_web -H 0.0.0.0 /data/dev.db
    networks:
      - accounta-network
    restart: unless-stopped

  # Redis Cache and Session Storage
  redis:
    image: redis:7-alpine
    container_name: accounta-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - accounta-network
    restart: unless-stopped

networks:
  accounta-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
