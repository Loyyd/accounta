services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: accounta:local
    container_name: accounta-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/accounta.db}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXP_SECONDS: ${JWT_EXP_SECONDS:-86400}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRUST_PROXY_COUNT: ${TRUST_PROXY_COUNT:-1}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
    ports:
      - "127.0.0.1:${APP_PORT:-5000}:5000"
    read_only: true
    volumes:
      - ./data:/app/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/ping', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
